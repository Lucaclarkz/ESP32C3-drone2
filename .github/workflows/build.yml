name: Build ESP32-C3 Firmware

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "${{ github.workspace }}/bin" >> $GITHUB_PATH

      - name: Configure CLI
        run: |
          arduino-cli config init
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 Core
        run: |
          arduino-cli core install esp32:esp32@2.0.17 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          # Git မှတစ်ဆင့် တည်ငြိမ်သော Version များကို တိုက်ရိုက်သွင်းခြင်း
          arduino-cli lib install "Adafruit MPU6050"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "Adafruit BusIO"
          
          # Async WebServer နှင့် TCP ကို Error ကင်းသော Version များအဖြစ် သီးသန့်သွင်းခြင်း
          arduino-cli lib install --git-url https://github.com/me-no-dev/ESPAsyncWebServer.git
          arduino-cli lib install --git-url https://github.com/me-no-dev/AsyncTCP.git

      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c3 \
            --output-dir build \
            --export-binaries \
            drone

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: build/*.bin
          
