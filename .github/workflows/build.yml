name: Build ESP32-C3 Firmware

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz -o arduino-cli.tar.gz
          tar -xzf arduino-cli.tar.gz
          sudo mv arduino-cli /usr/local/bin/
          arduino-cli version

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Install ESP32 Core (LOCK)
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install Libraries (PIN versions)
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "AsyncTCP@1.1.1"
          arduino-cli lib install "ESP Async WebServer@1.2.3"
          arduino-cli lib install "Adafruit MPU6050@2.2.9"
          arduino-cli lib install "Adafruit Unified Sensor@1.1.15"
          arduino-cli lib install "Adafruit BusIO@1.17.4"

      - name: Prepare Sketch
        run: |
          mkdir -p sketch/drone
          cp drone/drone.ino sketch/drone/drone.ino

      - name: Compile ESP32-C3
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c3 \
            --output-dir build \
            sketch/drone

      - name: Upload BIN
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/*.bin
